# Staging: PostgreSQL + Woleh API + Caddy (TLS).
# API image is built from ./Dockerfile.api and requires ./application.jar (built on laptop, rsync'd by deploy.sh).
# Prefer ./deploy.sh from your laptop (rsync bundle + JAR, SSH) or ./deploy.sh --local on the VPS.
# Or: copy .env from .env.example, then:
#   docker compose up -d --build
#
# Point DNS for woleh.okaidarkomorgan.com at this host; open TCP 80 and 443.
#
# Actuator (health, metrics, Prometheus) listens on api:8081 only — not proxied by Caddy.
# Prometheus scrapes api:8081 on the Docker network. Grafana binds to loopback:3000 on the host.

services:
  postgres:
    image: postgres:16-alpine
    container_name: woleh-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-woleh}
      POSTGRES_USER: ${POSTGRES_USER:-woleh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - woleh_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - woleh_staging

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: woleh-staging-api:latest
    container_name: woleh-staging-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-woleh}
      DATABASE_USER: ${POSTGRES_USER:-woleh}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-https://woleh.okaidarkomorgan.com,http://localhost:*,http://127.0.0.1:*}
      HEALTH_SHOW_DETAILS: ${HEALTH_SHOW_DETAILS:-when-authorized}
      HEALTH_SHOW_COMPONENTS: ${HEALTH_SHOW_COMPONENTS:-always}
      # SMS: default mock (StubSmsAdapter — no real texts). Set SMS_PROVIDER=nalo + NALO_SMS_API_KEY in .env for NALO.
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      NALO_SMS_API_KEY: ${NALO_SMS_API_KEY:-}
      NALO_SMS_API_URL: ${NALO_SMS_API_URL:-https://sms.nalosolutions.com/smsbackend/Resl_Nalo/send-message/}
      NALO_SMS_SENDER_ID: ${NALO_SMS_SENDER_ID:-Woleh}
      # Actuator on 8081 (see application-staging.yml). Main API + WS stay on 8080.
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-8081}
      # HTTP Basic for /actuator/prometheus (must match deploy/staging/prometheus.yml basic_auth).
      SPRING_SECURITY_USER_NAME: ${PROMETHEUS_SCRAPE_USER:-prometheus}
      SPRING_SECURITY_USER_PASSWORD: ${PROMETHEUS_SCRAPE_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8081/actuator/health/readiness",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - woleh_staging

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: woleh-staging-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_healthy
    networks:
      - woleh_staging

  grafana:
    image: grafana/grafana:10.4.3
    container_name: woleh-staging-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - woleh_staging

  caddy:
    image: caddy:2-alpine
    container_name: woleh-staging-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - woleh_staging

volumes:
  woleh_staging_pgdata:
  caddy_data:
  caddy_config:
  grafana_data:

networks:
  woleh_staging:
    driver: bridge
