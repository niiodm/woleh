# Scrape Woleh API metrics on the internal Docker network only (management port 8081).
# Prometheus has no published host port; use Grafana or docker exec to inspect.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: woleh-api
    metrics_path: /actuator/prometheus
    # Must match SPRING_SECURITY_USER_NAME / SPRING_SECURITY_USER_PASSWORD on the API service.
    basic_auth:
      username: prometheus
      password: aa2a60d6c8b24f502ef3396324e41c84710f478e4a70b0966713b59985f30638
    static_configs:
      - targets:
          - api:8081
