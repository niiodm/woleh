# Local dependencies for the Woleh API (PostgreSQL).
# From this directory: docker compose up -d
# Spring Boot (spring-boot-docker-compose) also uses this file when cwd is `server/`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: woleh-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-woleh}
      POSTGRES_USER: ${POSTGRES_USER:-woleh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woleh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - woleh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-woleh} -d ${POSTGRES_DB:-woleh}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  woleh_pgdata:
