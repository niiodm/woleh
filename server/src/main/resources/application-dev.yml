# Profile `dev`: run the API without PostgreSQL (H2 in-memory). Not for production.
spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:wolehdev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false

woleh:
  otp:
    # Log plaintext OTP to the console in dev — NEVER enable in production.
    dev-log-otp: true
  payment:
    # Override base-url for dev so the stub checkout link works on physical devices.
    # The default uses localhost (works for emulators).
    # For a physical device on the same Wi-Fi, set DEV_HOST to your machine's LAN IP:
    #   DEV_HOST=172.16.0.100  (then restart the server)
    base-url: "http://${DEV_HOST:localhost}:8080"

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
