# Profile `dev`: run the API without PostgreSQL (H2 in-memory). Not for production.
spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:wolehdev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
