# Profile `staging`: used by Docker Compose staging stack (not for local dev H2).
spring:
  application:
    name: woleh

management:
  # Actuator (health, metrics, prometheus) is served only on this port — not proxied by Caddy.
  # Prometheus in deploy/staging/docker-compose scrapes http://api:8081/actuator/prometheus on the internal network.
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:when-authorized}
      show-components: ${HEALTH_SHOW_COMPONENTS:always}

logging:
  level:
    root: INFO
    odm.clarity.woleh: INFO
