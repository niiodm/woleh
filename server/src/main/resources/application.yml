spring:
  application:
    name: woleh

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # `spring-boot-docker-compose` (developmentOnly): if Docker is available, runs `docker compose up`.
  # Compose file: `server/docker-compose.yml` (relative to cwd, usually `server/`).
  # Override: `DOCKER_COMPOSE_FILE` or `SPRING_DOCKER_COMPOSE_ENABLED=false`.
  docker:
    compose:
      enabled: true
      file: ${DOCKER_COMPOSE_FILE:docker-compose.yml}
      # Leave Postgres running when the JVM exits; `docker compose down` when you want to stop DB.
      lifecycle-management: start-only

# Default: expect PostgreSQL (local Docker or managed instance). Override via env or profile.
# Quick local API without Postgres: run with --spring.profiles.active=dev (uses in-memory H2; see application-dev.yml).
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/woleh}
    username: ${DATABASE_USER:woleh}
    password: ${DATABASE_PASSWORD:woleh}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  servlet:
    context-path: /

management:
  # When `management.server.port` is set (see `application-staging.yml` / env), all actuator
  # endpoints move off the API port so Caddy never exposes metrics to the internet.
  # Local dev and tests omit it — actuator stays on the same port as the API (8080).
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # Always show component details (db, diskSpace, etc.) so orchestrators and curl can confirm DB liveness.
      # Override with HEALTH_SHOW_DETAILS=when-authorized before exposing to the public internet.
      show-details: ${HEALTH_SHOW_DETAILS:always}
      show-components: ${HEALTH_SHOW_COMPONENTS:always}
      probes:
        # /actuator/health/liveness and /actuator/health/readiness — useful for Kubernetes / Docker health-checks.
        enabled: ${HEALTH_PROBES_ENABLED:true}
  metrics:
    distribution:
      # Enable histogram buckets for HTTP server requests so Prometheus can compute p50/p95/p99.
      # Used for SLO tracking — see docs/runbooks/SLO_BASELINE.md.
      percentiles-histogram:
        "[http.server.requests]": true

# JWT access tokens (HS256). Override JWT_SECRET in every non-local environment.
woleh:
  jwt:
    issuer: ${JWT_ISSUER:woleh}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT24H}
    refresh-token-ttl: ${JWT_REFRESH_TTL:PT720H}
    secret: ${JWT_SECRET:dev-only-do-not-use-in-production-0123456789abcdef0123456789abcdef}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  # OTP policy (ADR 0002). dev-log-otp must stay false in production.
  otp:
    ttl: ${OTP_TTL:PT5M}
    rate-limit-window: ${OTP_RATE_LIMIT_WINDOW:PT1H}
    rate-limit-max-sends: ${OTP_RATE_LIMIT_MAX_SENDS:3}
    dev-log-otp: false
  # Payment provider (ADR 0005). Replace base-url and add provider credentials for prod.
  payment:
    base-url: ${PAYMENT_BASE_URL:http://localhost:8080}
  ratelimit:
    place-list:
      # Per-user fixed-window limit for watch/broadcast list PUT operations.
      # Single-node in-memory only — requires ADR before switching to Redis for multi-instance.
      requests-per-minute: ${PLACE_LIST_RPM:10}
    location-publish:
      # Minimum milliseconds between POST /api/v1/me/location per user (~1 Hz default).
      min-interval-millis: ${LOCATION_PUBLISH_MIN_INTERVAL_MS:1000}
  # Push (FCM). Default off — enable only after Firebase credentials are configured.
  push:
    enabled: ${WOLEH_PUSH_ENABLED:false}
    fcm:
      project-id: ${FCM_PROJECT_ID:}
      service-account-json-path: ${FCM_SERVICE_ACCOUNT_JSON:}

# SMS (bus_finder parity: mock locally, NALO in production — https://sms.nalosolutions.com)
sms:
  provider: ${SMS_PROVIDER:mock}
  nalo:
    api-url: ${NALO_SMS_API_URL:https://sms.nalosolutions.com/smsbackend/Resl_Nalo/send-message/}
    api-key: ${NALO_SMS_API_KEY:}
    sender-id: ${NALO_SMS_SENDER_ID:Woleh}
    # Quoted so `{}` is not parsed as YAML; use SMS_NALO_OTP_MESSAGE_TEMPLATE to override.
    otp-message-template: "Your Woleh OTP is: {}. Valid for 5 minutes."
  http:
    connect-timeout: ${SMS_HTTP_CONNECT_TIMEOUT_MS:5000}
    read-timeout: ${SMS_HTTP_READ_TIMEOUT_MS:10000}
